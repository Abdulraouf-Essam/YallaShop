<nav
    class="fixed top-0 w-full z-50 px-6 flex items-center justify-between backdrop-blur-md bg-white/30 border-b border-white/20">
    <div>
        <img src="assets/SVG/YallaShopLogo.svg" class="w-[160px]" alt="">
    </div>

    <div class="hidden md:flex space-x-8 text-sm font-semibold uppercase tracking-widest text-slate-700">
        <a routerLink="/home" class="hover:text-black transition">Home</a>
        <a routerLink="/home/products" class="hover:text-black transition">Products</a>
        <a routerLink="/home/categories" class="hover:text-black transition">Categories</a>
    </div>

    <div class="flex items-center space-x-6">
        @if (isLoggedIn && currentUser) {
        <div class="flex items-center space-x-4">
            <span class="text-sm font-semibold text-slate-700">
                Welcome, {{ currentUser.firstName }} {{ currentUser.lastName }}
            </span>
            <button (click)="logout()"
                class="bg-[#16E4CE] hover:bg-[#13cabb] text-gray-900 text-sm font-bold py-2 px-4 rounded-full uppercase tracking-wider transition-all duration-300">
                Logout
            </button>
        </div>
        } @else {
        <a routerLink="/auth/login"
            class="bg-[#16E4CE] hover:bg-[#13cabb] text-gray-900 text-sm font-bold py-2 px-4 rounded-full uppercase tracking-wider transition-all duration-300">
            Login
        </a>
        }
    </div>
