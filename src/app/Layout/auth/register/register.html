<div class="min-h-screen w-full flex items-center justify-center bg-[#597e80] font-sans relative overflow-hidden px-4">
    <div
        class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-[#3f5f61] rounded-full mix-blend-multiply filter blur-3xl opacity-70">
    </div>
    <div
        class="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-[#76a5a7] rounded-full mix-blend-multiply filter blur-3xl opacity-70">
    </div>
    <div
        class="relative z-10 w-full max-w-xl bg-white/10 backdrop-blur-2xl border border-white/20 p-8 sm:p-10 rounded-[2.5rem] shadow-[0_8px_32px_0_rgba(0,0,0,0.25)]">

        <div class="text-center mb-8">
            <h2 class="text-white font-black text-4xl tracking-tight drop-shadow-md mb-2">
                CREATE ACCOUNT.
            </h2>
            <p class="text-white/80 text-sm font-medium">
                Join us and start your creative journey.
            </p>
        </div>

        <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="space-y-4">

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label for="firstName" class="block text-white/90 text-sm font-bold mb-2 ml-1">First Name</label>
                    <input type="text" id="firstName" formControlName="firstName" placeholder="First name"
                        class="w-full bg-white/10 border border-white/20 text-white placeholder-white/50 text-sm rounded-2xl px-5 py-4 focus:outline-none focus:ring-2 focus:ring-[#16E4CE] focus:bg-white/20 transition-all duration-300">
                    <div *ngIf="registerForm.get('firstName')?.touched && registerForm.get('firstName')?.invalid"
                        class="text-[#ffb3b3] text-xs mt-2 ml-1 font-medium">
                        First name is required.
                    </div>
                </div>
                <div>
                    <label for="lastName" class="block text-white/90 text-sm font-bold mb-2 ml-1">Last Name</label>
                    <input type="text" id="lastName" formControlName="lastName" placeholder="Last name"
                        class="w-full bg-white/10 border border-white/20 text-white placeholder-white/50 text-sm rounded-2xl px-5 py-4 focus:outline-none focus:ring-2 focus:ring-[#16E4CE] focus:bg-white/20 transition-all duration-300">
                    <div *ngIf="registerForm.get('lastName')?.touched && registerForm.get('lastName')?.invalid"
                        class="text-[#ffb3b3] text-xs mt-2 ml-1 font-medium">
                        Last name is required.
                    </div>
                </div>
            </div>

            <div>
                <label for="email" class="block text-white/90 text-sm font-bold mb-2 ml-1">Email</label>
                <input type="email" id="email" formControlName="email" placeholder="Enter your email"
                    class="w-full bg-white/10 border border-white/20 text-white placeholder-white/50 text-sm rounded-2xl px-5 py-4 focus:outline-none focus:ring-2 focus:ring-[#16E4CE] focus:bg-white/20 transition-all duration-300">
                <div *ngIf="registerForm.get('email')?.touched && registerForm.get('email')?.invalid"
                    class="text-[#ffb3b3] text-xs mt-2 ml-1 font-medium">
                    Please enter a valid email address.
                </div>
            </div>

            <div>
                <label for="username" class="block text-white/90 text-sm font-bold mb-2 ml-1">Username</label>
                <input type="text" id="username" formControlName="username" placeholder="Choose a username"
                    class="w-full bg-white/10 border border-white/20 text-white placeholder-white/50 text-sm rounded-2xl px-5 py-4 focus:outline-none focus:ring-2 focus:ring-[#16E4CE] focus:bg-white/20 transition-all duration-300">
                <div *ngIf="registerForm.get('username')?.touched && registerForm.get('username')?.invalid"
                    class="text-[#ffb3b3] text-xs mt-2 ml-1 font-medium">
                    Username is required.
                </div>
            </div>

            <div>
                <label for="password" class="block text-white/90 text-sm font-bold mb-2 ml-1">Password</label>
                <input type="password" id="password" formControlName="password" placeholder="Create a password"
                    class="w-full bg-white/10 border border-white/20 text-white placeholder-white/50 text-sm rounded-2xl px-5 py-4 focus:outline-none focus:ring-2 focus:ring-[#16E4CE] focus:bg-white/20 transition-all duration-300">
                <div *ngIf="registerForm.get('password')?.touched && registerForm.get('password')?.invalid"
                    class="text-[#ffb3b3] text-xs mt-2 ml-1 font-medium">
                    Password must be at least 6 characters.
                </div>
            </div>

            <div *ngIf="errorMessage" class="text-[#ffb3b3] text-sm text-center font-medium">
                {{ errorMessage }}
            </div>

            <button type="submit" [disabled]="registerForm.invalid || isLoading"
                class="w-full mt-8 bg-[#16E4CE] hover:bg-[#13cabb] disabled:opacity-50 disabled:hover:bg-[#16E4CE] disabled:hover:translate-y-0 text-gray-900 text-sm font-bold py-4 px-10 rounded-full uppercase tracking-wider transition-all duration-300 shadow-[0_4px_14px_0_rgba(22,228,206,0.39)] hover:shadow-[0_6px_20px_rgba(22,228,206,0.23)] hover:-translate-y-1">
                {{ isLoading ? 'Creating Account...' : 'Create Account' }}
            </button>

        </form>

        <div class="mt-8 text-center text-sm text-white/70">
            Already have an account?
            <a (click)="goToLogin()" class="text-white font-bold hover:text-[#16E4CE] transition-colors cursor-pointer">
                Sign in now
            </a>
        </div>

    </div>
</div>
