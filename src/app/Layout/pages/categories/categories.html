<section
    class="relative w-full py-20 px-6 sm:px-12 md:px-20 lg:px-24 bg-gradient-to-r from-[#e9f6f1] via-white to-[#fffcf2]">

    <div
        class="max-w-7xl mx-auto relative z-10 mb-16 flex flex-col md:flex-row justify-between items-start md:items-center gap-6">

        <div>
            <h1 class="text-[#597e80] font-black text-5xl md:text-6xl tracking-tighter uppercase drop-shadow-sm">
                The Collection
            </h1>
            <p class="text-gray-500 mt-3 text-lg font-medium">
                Explore our latest arrivals designed for the modern creator.
            </p>
        </div>

        <div>
            <a (click)="goBack()"
                class="w-10 h-10 flex items-center justify-center rounded-xl border border-gray-400 text-gray-500 hover:bg-gray-50 hover:text-gray-700 transition-colors cursor-pointer shadow-sm">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2"
                    stroke="currentColor" class="w-5 h-5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
                </svg>
            </a>
        </div>

    </div>

    <div class="max-w-7xl mx-auto relative z-10">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 md:gap-8 lg:gap-10">

            @for (category of categories(); track category.slug) {
            <div class="relative group h-[450px] sm:h-[480px] lg:h-[450px] overflow-hidden shadow-xl transition-transform duration-300 hover:scale-105"
                [ngClass]="category.customClass">

                <img [src]="category.image" [alt]="category.name" class="absolute inset-0 w-full h-full object-cover">

                <div
                    class="absolute inset-x-0 bottom-0 bg-gradient-to-t from-black/70 via-black/10 to-transparent p-8 md:p-10 flex flex-col justify-end">

                    <h3 class="text-3xl font-bold text-white mb-5 drop-shadow-md">
                        {{ category.name }}
                    </h3>

                    <a [routerLink]="['/home/products', category.slug]"
                        class="inline-block self-start text-xs font-semibold text-gray-900 bg-white/70 px-8 py-3.5 rounded-full uppercase tracking-wider transition-colors hover:bg-white focus:outline-none focus:ring-2 focus:ring-white focus:ring-offset-2 cursor-pointer">
                        VIEW
                    </a>
                </div>
            </div>
            }

        </div>
    </div>
</section>
